<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 740" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="ah" viewBox="0 0 8 6" refX="4" refY="3" markerWidth="11" markerHeight="8" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4C1D95"/>
    </marker>
  </defs>

  <!-- Background: transparent -->

  <!-- Title -->
  <text x="475" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#1E1B3A" letter-spacing="-0.3">CKEditor AI Architecture</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- TOP ROW: Two frontend boxes with gap for arrow     -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- ── CKEditor 5 (purple) ── -->
  <rect x="45" y="70" width="370" height="150" rx="12" fill="#FFF" stroke="#D4C5EC" stroke-width="1" filter="url(#shadow)"/>
  <rect x="45" y="70" width="370" height="44" rx="12" fill="#4C1D95"/>
  <rect x="45" y="102" width="370" height="12" fill="#4C1D95"/>
  <text x="230" y="98" text-anchor="middle" font-size="17" font-weight="700" fill="#FFF">CKEditor 5</text>
  <text x="230" y="138" text-anchor="middle" font-size="14" fill="#4B4766">AI Chat, Quick Actions, Review &amp; Translate</text>
  <text x="230" y="158" text-anchor="middle" font-size="14" fill="#4B4766">built into the editor.</text>
  <text x="230" y="184" text-anchor="middle" font-size="13" fill="#9892A6">AI features work out of the box.</text>

  <!-- ── Your custom frontend logic (blue) ── -->
  <rect x="535" y="70" width="370" height="150" rx="12" fill="#FFF" stroke="#D4C5EC" stroke-width="1" filter="url(#shadow)"/>
  <rect x="535" y="70" width="370" height="44" rx="12" fill="#4C1D95"/>
  <rect x="535" y="102" width="370" height="12" fill="#4C1D95"/>
  <text x="720" y="98" text-anchor="middle" font-size="17" font-weight="700" fill="#FFF">Your custom frontend logic</text>
  <text x="720" y="138" text-anchor="middle" font-size="14" fill="#4B4766">Extend AI beyond the editor to</text>
  <text x="720" y="158" text-anchor="middle" font-size="14" fill="#4B4766">generate titles, summaries, or metadata.</text>
  <text x="720" y="184" text-anchor="middle" font-size="13" fill="#9892A6">Use editor's API or REST API.</text>

  <!-- "via Editor API" horizontal arrow: custom frontend → CKEditor -->
  <line x1="525" y1="140" x2="425" y2="140" stroke="#4C1D95" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="475" y="131" text-anchor="middle" font-size="13" font-weight="600" fill="#4C1D95">via Editor API</text>

  <!-- "Frontend interactions" zone label -->
  <text x="935" y="136" font-size="13" font-weight="600" fill="#4C1D95" letter-spacing="0.5">Frontend</text>
  <text x="935" y="156" font-size="13" font-weight="600" fill="#4C1D95" letter-spacing="0.5">interactions</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- ARROWS: Top boxes ↔ AI Service                     -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- CKEditor 5 ↓ AI Service -->
  <line x1="210" y1="230" x2="210" y2="300" stroke="#4C1D95" stroke-width="2" marker-end="url(#ah)"/>
  <!-- CKEditor 5 ↑ AI Service -->
  <line x1="240" y1="306" x2="240" y2="236" stroke="#4C1D95" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Your custom frontend ↓ AI Service -->
  <line x1="700" y1="230" x2="700" y2="300" stroke="#4C1D95" stroke-width="2" marker-end="url(#ah)"/>
  <!-- Your custom frontend ↑ AI Service -->
  <line x1="730" y1="306" x2="730" y2="236" stroke="#4C1D95" stroke-width="2" marker-end="url(#ah)"/>
  <text x="758" y="274" font-size="12" font-weight="600" fill="#4C1D95">via REST API</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- MIDDLE: CKEditor AI Service (teal)                 -->
  <!-- ═══════════════════════════════════════════════════ -->

  <rect x="45" y="316" width="860" height="165" rx="14" fill="#115E59" filter="url(#shadow)"/>

  <text x="475" y="370" text-anchor="middle" font-size="24" font-weight="700" fill="#FFF">CKEditor AI Service</text>
  <text x="475" y="392" text-anchor="middle" font-size="13" fill="#FFFFFF">Analyzes content, generates changes, and streams AI responses.</text>
  <text x="475" y="410" text-anchor="middle" font-size="13" fill="#FFFFFF">Managed cloud or self-hosted on-premises.</text>

  <!-- Category pills -->
  <rect x="220" y="430" width="110" height="30" rx="6" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.20)" stroke-width="1"/>
  <text x="275" y="450" text-anchor="middle" font-size="14" font-weight="600" fill="#CCFBF1">Actions</text>
  <rect x="345" y="430" width="150" height="30" rx="6" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.20)" stroke-width="1"/>
  <text x="420" y="450" text-anchor="middle" font-size="14" font-weight="600" fill="#CCFBF1">Conversations</text>
  <rect x="510" y="430" width="110" height="30" rx="6" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.20)" stroke-width="1"/>
  <text x="565" y="450" text-anchor="middle" font-size="14" font-weight="600" fill="#CCFBF1">Reviews</text>
  <rect x="635" y="430" width="110" height="30" rx="6" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.20)" stroke-width="1"/>
  <text x="690" y="450" text-anchor="middle" font-size="14" font-weight="600" fill="#CCFBF1">Translate</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- ARROWS: AI Service ↔ Backend                       -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- MCP servers ↕ AI Service -->
  <line x1="162" y1="491" x2="162" y2="563" stroke="#4C1D95" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="192" y1="569" x2="192" y2="497" stroke="#4C1D95" stroke-width="2" marker-end="url(#ah)"/>

  <!-- AI platform ↕ AI Service -->
  <line x1="457" y1="491" x2="457" y2="563" stroke="#4C1D95" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="487" y1="569" x2="487" y2="497" stroke="#4C1D95" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Your custom backend logic ↕ AI Service -->
  <line x1="750" y1="491" x2="750" y2="563" stroke="#4C1D95" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="780" y1="569" x2="780" y2="497" stroke="#4C1D95" stroke-width="2" marker-end="url(#ah)"/>
  <text x="808" y="537" font-size="12" font-weight="600" fill="#1E3A8A">via REST API</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- BOTTOM ROW: Three backend boxes                    -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- ── MCP servers ── -->
  <rect x="45" y="579" width="275" height="140" rx="12" fill="#FFF" stroke="#B8CCEC" stroke-width="1" filter="url(#shadow)"/>
  <rect x="45" y="579" width="275" height="44" rx="12" fill="#1E3A8A"/>
  <rect x="45" y="611" width="275" height="12" fill="#1E3A8A"/>
  <text x="182" y="606" text-anchor="middle" font-size="14" font-weight="700" fill="#FFF">MCP servers</text>
  <text x="182" y="644" text-anchor="middle" font-size="13" fill="#4B4766">Connect external tools and</text>
  <text x="182" y="662" text-anchor="middle" font-size="13" fill="#4B4766">data sources to the AI service.</text>
  <text x="182" y="684" text-anchor="middle" font-size="12" fill="#9892A6">On-premises only.</text>

  <!-- ── AI platform ── -->
  <rect x="335" y="579" width="275" height="140" rx="12" fill="#FFF" stroke="#B8CCEC" stroke-width="1" filter="url(#shadow)"/>
  <rect x="335" y="579" width="275" height="44" rx="12" fill="#1E3A8A"/>
  <rect x="335" y="611" width="275" height="12" fill="#1E3A8A"/>
  <text x="472" y="606" text-anchor="middle" font-size="14" font-weight="700" fill="#FFF">Internal AI platform</text>
  <text x="472" y="644" text-anchor="middle" font-size="13" fill="#4B4766">Connect your AI platform with</text>
  <text x="472" y="662" text-anchor="middle" font-size="13" fill="#4B4766">custom features to our backend.</text>
  <text x="472" y="684" text-anchor="middle" font-size="12" fill="#9892A6">Available on demand.</text>

  <!-- ── Your custom backend logic ── -->
  <rect x="625" y="579" width="280" height="140" rx="12" fill="#FFF" stroke="#B8CCEC" stroke-width="1" filter="url(#shadow)"/>
  <rect x="625" y="579" width="280" height="44" rx="12" fill="#1E3A8A"/>
  <rect x="625" y="611" width="280" height="12" fill="#1E3A8A"/>
  <text x="765" y="606" text-anchor="middle" font-size="14" font-weight="700" fill="#FFF">Your custom backend logic</text>
  <text x="765" y="644" text-anchor="middle" font-size="13" fill="#4B4766">Automate AI workflows server-side:</text>
  <text x="765" y="662" text-anchor="middle" font-size="13" fill="#4B4766">bulk processing, pipelines, scheduling.</text>
  <text x="765" y="684" text-anchor="middle" font-size="12" fill="#9892A6">Uses the REST API.</text>

  <!-- "Backend interactions" zone label -->
  <text x="935" y="637" font-size="13" font-weight="600" fill="#1E3A8A" letter-spacing="0.5">Backend</text>
  <text x="935" y="657" font-size="13" font-weight="600" fill="#1E3A8A" letter-spacing="0.5">interactions</text>

</svg>
